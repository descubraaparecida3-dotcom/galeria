var grid=document.getElementById('grid');PHOTOS.forEach(function(p,i){var d=document.createElement('div');d.className='cell';var im=document.createElement('img');im.loading='lazy';im.src=p.src;im.alt='Foto '+(i+1);d.appendChild(im);d.addEventListener('click',function(){openAt(i);});grid.appendChild(d);});var lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbCount=document.getElementById('lbCount'),cur=0;function openAt(i){cur=i;show();lb.classList.add('open');document.body.style.overflow='hidden';}function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}function show(){lbImg.src=PHOTOS[cur].src;lbCount.textContent=(cur+1)+' / '+PHOTOS.length;}function prev(){cur=(cur-1+PHOTOS.length)%PHOTOS.length;show();}function next(){cur=(cur+1)%PHOTOS.length;show();}function dl(src,name){var a=document.createElement('a');a.href=src;a.download=name;document.body.appendChild(a);a.click();a.remove();}document.getElementById('lbDl').addEventListener('click',function(){dl(PHOTOS[cur].src,PHOTOS[cur].name);});document.getElementById('lbX').addEventListener('click',closeLb);document.getElementById('lbPrev').addEventListener('click',prev);document.getElementById('lbNext').addEventListener('click',next);document.getElementById('dlAll').addEventListener('click',function(){PHOTOS.forEach(function(p,i){setTimeout(function(){dl(p.src,p.name);},i*350);});});document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLb();else if(e.key==='ArrowLeft')prev();else if(e.key==='ArrowRight')next();});lb.addEventListener('click',function(e){if(e.target===lb)closeLb();});</script></body></html>
